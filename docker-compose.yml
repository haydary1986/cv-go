version: '3.8'

services:
  cv-builder:
    build: .
    container_name: cv-builder
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - cv-data:/app/data
    environment:
      - PORT=8080
      - DB_PATH=/app/data/cvbuilder.db
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - AES_KEY=${AES_KEY:-0123456789abcdef0123456789abcdef}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - GIN_MODE=release
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  cv-data:
    driver: local
