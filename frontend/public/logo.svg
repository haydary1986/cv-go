<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Shield Background -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 195 Q20 170 20 120 L20 50 Z" fill="#1a5276" stroke="#c0982b" stroke-width="3"/>
  <!-- Inner Shield -->
  <path d="M100 25 L165 58 L165 118 Q165 160 100 182 Q35 160 35 118 L35 58 Z" fill="#1a5276"/>
  <!-- Book/Knowledge Symbol -->
  <g transform="translate(100,80)" fill="#c0982b">
    <!-- Open Book -->
    <path d="M-35 10 Q-35 -20 0 -25 Q35 -20 35 10 L35 30 Q35 0 0 -5 Q-35 0 -35 30 Z" fill="none" stroke="#c0982b" stroke-width="2.5"/>
    <line x1="0" y1="-25" x2="0" y2="30" stroke="#c0982b" stroke-width="1.5"/>
    <!-- Lines on pages -->
    <line x1="-25" y1="0" x2="-8" y2="-5" stroke="#c0982b" stroke-width="1" opacity="0.6"/>
    <line x1="-25" y1="8" x2="-8" y2="3" stroke="#c0982b" stroke-width="1" opacity="0.6"/>
    <line x1="-25" y1="16" x2="-8" y2="11" stroke="#c0982b" stroke-width="1" opacity="0.6"/>
    <line x1="8" y1="-5" x2="25" y2="0" stroke="#c0982b" stroke-width="1" opacity="0.6"/>
    <line x1="8" y1="3" x2="25" y2="8" stroke="#c0982b" stroke-width="1" opacity="0.6"/>
    <line x1="8" y1="11" x2="25" y2="16" stroke="#c0982b" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- Star -->
  <polygon points="100,35 104,47 117,47 107,55 110,67 100,60 90,67 93,55 83,47 96,47" fill="#c0982b"/>
  <!-- Laurel Left -->
  <g fill="none" stroke="#c0982b" stroke-width="1.5" opacity="0.8">
    <path d="M55 140 Q45 130 50 115"/>
    <path d="M55 140 Q40 135 40 120"/>
    <path d="M55 140 Q38 140 35 128"/>
  </g>
  <!-- Laurel Right -->
  <g fill="none" stroke="#c0982b" stroke-width="1.5" opacity="0.8">
    <path d="M145 140 Q155 130 150 115"/>
    <path d="M145 140 Q160 135 160 120"/>
    <path d="M145 140 Q162 140 165 128"/>
  </g>
  <!-- University Name Circle -->
  <text x="100" y="140" text-anchor="middle" fill="#ffffff" font-size="11" font-family="Arial, sans-serif" font-weight="bold">جامعة التراث</text>
  <text x="100" y="158" text-anchor="middle" fill="#c0982b" font-size="8" font-family="Arial, sans-serif">UNIVERSITY OF HERITAGE</text>
</svg>
